#
# this workflow will move the release flagged as 'pre-release' to the release named 'latest'
#
# see ./scripts/release.sh for details
#
name: 'release (manual workflow)'

on:
  # this workflow needs to be triggered manually
  workflow_dispatch:

permissions:
  # release.sh creates/deletes tags and creates/edits releases and their assets via 'gh' - all of
  # that falls under the 'contents' permission scope for the GITHUB_TOKEN
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # share one concurrency group with the 'pre-release' workflow so pre-release and release never
    # run at the same time - the later trigger queues instead of racing/cancelling the other
    concurrency:
      group: ionos-wordpress-release-pipeline
      cancel-in-progress: false
    steps:
      # only run on main branch
      - name: Check branch
        if: github.ref_name != 'main'
        run: |
          echo "::error::Workflow can only be run on branch 'main'"
          exit 1

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: '${{ github.ref_name }}'

      # release.sh uses `pnpm ls` to resolve a package name to its workspace folder - read the
      # pnpm version from .devcontainer/Dockerfile so both stay in sync automatically
      - name: Read pnpm version
        id: pnpm-version
        run: echo "value=$(grep -oP '^ENV PNPM_VERSION \K.+' .devcontainer/Dockerfile)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ steps.pnpm-version.outputs.value }}

      - name: release
        run: |
          export GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          export GCHAT_RELEASE_ANNOUNCEMENTS_WEBHOOK="${{ secrets.GCHAT_RELEASE_ANNOUNCEMENTS_WEBHOOK }}"
          export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
          export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"

          ./scripts/release.sh
