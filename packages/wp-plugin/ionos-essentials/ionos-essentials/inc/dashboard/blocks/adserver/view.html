<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>AdServer</title>
    <script
      src="https://ce1.uicdn.net/exos/framework/3.0/exos.min.js"
      async="async"
      defer="defer"></script>
    <link
      rel="stylesheet"
      href="https://ce1.uicdn.net/exos/framework/3.0/exos.min.css" />
  </head>
  <body style="overflow: hidden; background: white">
    <div class="ias-zone"></div>

    <script type="text/javascript">
      var OAO = OAO || {}; // OAO refers to the global OAO variable.
      OAO.q = OAO.q || {};
      OAO.q.c = OAO.q.c || [];

      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token') || 'adserver_default_token';
      const zoneId = urlParams.get('zoneid') || '';
      document.querySelector('.ias-zone').setAttribute('data-ias-zoneid', zoneId);
      OAO.q.c.push(['setFrontendToken', token]);
      OAO.q.c.push(['setPageName', 'Dashboard']); // please use: [a-zA-Z_]
    </script>
    <script
      id="oaotag"
      type="text/javascript"
      src="https://frontend-services.ionos.com/t/tag/IONOS/wp-admin.js"
      async="async"
      defer="defer"></script>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const adzone = document.querySelector('.ias-zone');
        const shadowDom = window.parent.document.querySelector('#wpbody-content').shadowRoot;
        const iframe = shadowDom.querySelector('iframe#adzone');

        const observer = new MutationObserver(function (mutations) {
          if (adzone.children.length > 0) {
            observer.disconnect();

            iframe.style.display = 'block';
            iframe.style.height = document.querySelector('.ias-zone>div').offsetHeight + 'px';

            document.querySelectorAll('[target]').forEach(function (element) {
              element.setAttribute('target', '_blank');
            });
          }
        });

        window.addEventListener('resize', function () {
          iframe.style.height = document.querySelector('.ias-zone>div').offsetHeight + 'px';
        });

        observer.observe(adzone, {
          childList: true,
          subtree: true,
          attributes: true,
        });
      });
    </script>
  </body>
</html>
